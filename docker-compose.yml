services:
  api1:
    build: .
    platform: linux/amd64
    environment:
      RED_HELA_ROOT: /app
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  api2:
    build: .
    platform: linux/amd64
    environment:
      RED_HELA_ROOT: /app
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  lb:
    image: nginx:alpine
    platform: linux/amd64
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./submission/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "20M"

networks:
  rinha:
    driver: bridge
